<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGIS Analitik - Daffa Gusti</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

<style>
    :root {
        --bg-color: #0f172a;
        --panel-bg: rgba(30, 41, 59, 0.85);
        --panel-bg-solid: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent-primary: #3b82f6;
        --accent-secondary: #8b5cf6;
        --border-color: rgba(255, 255, 255, 0.1);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        --radius: 16px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Header */
    header {
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9));
        backdrop-filter: blur(10px);
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
        z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
        width: 36px; height: 36px; border-radius: 10px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        display: flex; align-items: center; justify-content: center; font-size: 18px;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }
    .brand-text h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .brand-text h1 span { color: var(--accent-primary); }
    .brand-text p { font-size: 10px; color: var(--text-muted); font-weight: 300; }
    
    /* Map Container */
    #map-wrapper { flex: 1; position: relative; display: flex; }
    #map { width: 100%; height: 100%; z-index: 1; background: #0f172a; }
    
    /* Floating Panel */
    .glass-panel {
        background: var(--panel-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: var(--glass-shadow);
        color: var(--text-main);
    }
    
    #sidebar {
        position: absolute; top: 15px; left: 15px; width: 360px;
        max-height: calc(100% - 30px); z-index: 1000; display: flex; flex-direction: column;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    }
    
    /* Tabs */
    .tabs-header {
        display: flex; border-bottom: 1px solid var(--border-color);
        background: rgba(0,0,0,0.2); border-radius: var(--radius) var(--radius) 0 0;
    }
    .tab-btn {
        flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 600;
        color: var(--text-muted); background: none; border: none; cursor: pointer;
        transition: 0.3s; position: relative; outline: none;
    }
    .tab-btn:hover { color: var(--text-main); }
    .tab-btn.active { color: var(--accent-primary); }
    .tab-btn.active::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0;
        height: 2px; background: var(--accent-primary);
        box-shadow: 0 -2px 10px rgba(59,130,246,0.5);
    }
    
    .panel-content { padding: 16px; overflow-y: auto; flex: 1; }
    .panel-content::-webkit-scrollbar { width: 4px; }
    .panel-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    
    .tab-pane { display: none; animation: fadeIn 0.3s ease; }
    .tab-pane.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* Layer Cards */
    .layer-card {
        background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
        border-radius: 12px; padding: 12px; margin-bottom: 10px; transition: all 0.3s ease;
    }
    .layer-card:hover { border-color: rgba(59,130,246,0.4); }
    .layer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .layer-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .layer-icon {
        width: 26px; height: 26px; border-radius: 8px;
        display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .layer-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    
    /* Toggle */
    .toggle {
        width: 36px; height: 20px; background: rgba(255,255,255,0.1);
        border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s;
    }
    .toggle.active { background: var(--accent-primary); }
    .toggle::after {
        content: ''; position: absolute; top: 2px; left: 2px;
        width: 16px; height: 16px; background: #fff; border-radius: 50%;
        transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .toggle.active::after { transform: translateX(16px); }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
    .form-input, .form-select {
        width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color);
        color: var(--text-main); padding: 10px 12px; border-radius: 8px; font-size: 13px; outline: none; transition: 0.3s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    
    /* Checkbox Group */
    .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .checkbox-label input { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }
    
    /* Stats Box */
    .stats-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .stat-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; text-align: center; }
    .stat-val { font-size: 18px; font-weight: 700; color: var(--accent-primary); margin-bottom: 2px; }
    .stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Controls */
    .map-controls { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
    .ctrl-btn {
        width: 36px; height: 36px; border-radius: 10px; background: var(--panel-bg);
        backdrop-filter: blur(10px); border: 1px solid var(--border-color); color: #fff;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.2s; font-size: 14px;
    }
    .ctrl-btn:hover { background: var(--accent-primary); transform: scale(1.05); }

    /* Loader */
    #loader {
        position: absolute; inset: 0; background: var(--bg-color); z-index: 2000;
        display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s;
    }
    .spinner {
        width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
        border-top-color: var(--accent-primary); border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Beautiful Popup */
    .leaflet-popup-content-wrapper { background: var(--panel-bg-solid) !important; border: 1px solid var(--border-color) !important; border-radius: 12px !important; box-shadow: var(--glass-shadow) !important; color: var(--text-main) !important; padding: 0 !important; overflow: hidden; }
    .leaflet-popup-tip { background: var(--panel-bg-solid) !important; }
    .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
    .popup-header { padding: 12px; border-bottom: 1px solid var(--border-color); display: flex; align-items: flex-start; gap: 10px; }
    .popup-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .popup-title { font-size: 14px; font-weight: 700; line-height: 1.2; margin-bottom: 2px; }
    .popup-subtitle { font-size: 10px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;}
    .popup-body { padding: 10px 12px; max-height: 180px; overflow-y: auto; }
    .popup-body::-webkit-scrollbar { width: 3px; }
    .popup-body::-webkit-scrollbar-thumb { background: var(--border-color); }
    .attr-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
    .attr-row:last-child { border-bottom: none; }
    .attr-key { font-size: 10px; color: var(--text-muted); }
    .attr-val { font-size: 11px; font-weight: 500; text-align: right; max-width: 65%; background: rgba(255,255,255,0.05); padding: 3px 6px; border-radius: 4px; word-break: break-word; }
    .leaflet-container a.leaflet-popup-close-button { color: #fff !important; top: 8px !important; right: 8px !important; }

    /* Custom MarkerCluster Styling for Dark Mode */
    .marker-cluster-small { background-color: rgba(59, 130, 246, 0.6) !important; }
    .marker-cluster-small div { background-color: rgba(59, 130, 246, 0.9) !important; color: white; }
    .marker-cluster-medium { background-color: rgba(139, 92, 246, 0.6) !important; }
    .marker-cluster-medium div { background-color: rgba(139, 92, 246, 0.9) !important; color: white; }
    .marker-cluster-large { background-color: rgba(249, 115, 22, 0.6) !important; }
    .marker-cluster-large div { background-color: rgba(249, 115, 22, 0.9) !important; color: white; }

    /* Chart Container */
    .chart-container { position: relative; height: 200px; width: 100%; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-text" style="font-size: 13px; color: var(--text-muted);">Memuat Analitik & GeoJSON...</div>
</div>

<header>
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-chart-pie"></i></div>
        <div class="brand-text">
            <h1>WebGIS <span>Analitik</span></h1>
            <p>Daffa Gusti · Leaflet + Chart.js</p>
        </div>
    </div>
</header>

<div id="map-wrapper">
    <div id="map"></div>
    
    <div class="map-controls">
        <div class="ctrl-btn" id="btn-zoom-in" title="Zoom In"><i class="fas fa-plus"></i></div>
        <div class="ctrl-btn" id="btn-zoom-out" title="Zoom Out"><i class="fas fa-minus"></i></div>
        <div class="ctrl-btn" id="btn-home" title="Kembali ke Area Studi"><i class="fas fa-home"></i></div>
        <div class="ctrl-btn" id="btn-toggle-sb" title="Toggle Panel"><i class="fas fa-sliders-h"></i></div>
    </div>

    <aside id="sidebar" class="glass-panel">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="openTab('tab-layers')"><i class="fas fa-layer-group"></i> Layers</button>
            <button class="tab-btn" onclick="openTab('tab-filter')"><i class="fas fa-filter"></i> Filter</button>
            <button class="tab-btn" onclick="openTab('tab-analytic')"><i class="fas fa-chart-bar"></i> Analitik</button>
        </div>
        
        <div class="panel-content">
            
            <!-- TAB LAYERS -->
            <div id="tab-layers" class="tab-pane active">
                <div class="stats-box">
                    <div class="stat-item"><div class="stat-val" id="stat-osm">0</div><div class="stat-lbl">Tampil</div></div>
                    <div class="stat-item"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Total Data</div></div>
                </div>

                <div class="form-label">Tampilan Peta</div>
                <div class="layer-card">
                    <div class="layer-header">
                        <div class="layer-name">
                            <div class="layer-icon" style="background: rgba(59,130,246,0.1); color: #3b82f6;"><i class="fas fa-map-marker-alt"></i></div>
                            Marker Clustering
                        </div>
                        <div class="toggle active" id="tog-cluster"></div>
                    </div>
                    <div class="layer-meta">Pengelompokan titik cerdas</div>
                </div>

                <div class="layer-card">
                    <div class="layer-header">
                        <div class="layer-name">
                            <div class="layer-icon" style="background: rgba(239,68,68,0.1); color: #ef4444;"><i class="fas fa-fire"></i></div>
                            Heatmap (Kepadatan)
                        </div>
                        <div class="toggle" id="tog-heatmap"></div>
                    </div>
                    <div class="layer-meta">Distribusi intensitas lokasi</div>
                </div>

                <div class="layer-card">
                    <div class="layer-header">
                        <div class="layer-name">
                            <div class="layer-icon" style="background: rgba(249,115,22,0.1); color: #f97316;"><i class="fas fa-draw-polygon"></i></div>
                            Batas Wilayah
                        </div>
                        <div class="toggle active" id="tog-clip"></div>
                    </div>
                    <div class="layer-meta">Area studi</div>
                </div>
            </div>

            <!-- TAB FILTER -->
            <div id="tab-filter" class="tab-pane">
                <div class="form-group">
                    <label class="form-label">Cari Nama Lokasi</label>
                    <input type="text" id="search-input" class="form-input" placeholder="Ketik nama toko, fasilitas, dll..." oninput="applyFilters()">
                </div>

                <div class="form-group">
                    <label class="form-label">Kategori Utama</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="cat-filter" value="shop" onchange="applyFilters()" checked> Toko / Shop (Warna Hijau)</label>
                        <label class="checkbox-label"><input type="checkbox" class="cat-filter" value="landuse" onchange="applyFilters()" checked> Penggunaan Lahan (Warna Oranye)</label>
                        <label class="checkbox-label"><input type="checkbox" class="cat-filter" value="leisure" onchange="applyFilters()" checked> Tempat Hiburan / Rekreasi (Warna Biru)</label>
                        <label class="checkbox-label"><input type="checkbox" class="cat-filter" value="other" onchange="applyFilters()" checked> Lainnya (Warna Ungu)</label>
                    </div>
                </div>
                
                <button onclick="applyFilters()" style="width: 100%; padding: 10px; background: var(--accent-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s;">Terapkan Filter</button>
            </div>

            <!-- TAB ANALYTIC -->
            <div id="tab-analytic" class="tab-pane">
                <div class="form-label" style="text-align: center; margin-bottom: 10px;">Distribusi Kategori</div>
                <div class="chart-container" style="height: 180px;">
                    <canvas id="categoryChart"></canvas>
                </div>
                
                <div class="form-label" style="text-align: center; margin-top: 25px; margin-bottom: 10px;">Top 5 Sub-Kategori</div>
                <div class="chart-container" style="height: 200px;">
                    <canvas id="topTypeChart"></canvas>
                </div>
            </div>

        </div>
    </aside>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // Tab Logic
    function openTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Map Init
    const map = L.map('map', { center: [-6.925, 107.6], zoom: 12, zoomControl: false });
    const basemap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    basemap.on('load', () => { document.querySelector('.leaflet-tile-pane').style.filter = 'brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7)'; });

    // Controls
    document.getElementById('btn-zoom-in').onclick = () => map.zoomIn();
    document.getElementById('btn-zoom-out').onclick = () => map.zoomOut();
    document.getElementById('btn-toggle-sb').onclick = () => {
        const sb = document.getElementById('sidebar');
        sb.style.transform = sb.style.transform === 'translateX(-120%)' ? 'translateX(0)' : 'translateX(-120%)';
        sb.style.opacity = sb.style.opacity === '0' ? '1' : '0';
    };

    // State Variables
    let allData = [];
    let filteredData = [];
    let layerClip = null;
    
    // Layer Groups
    let markersCluster = L.markerClusterGroup({
        chunkedLoading: true, spiderfyOnMaxZoom: true, showCoverageOnHover: false, maxClusterRadius: 60
    });
    let heatLayer = L.heatLayer([], { radius: 20, blur: 15, maxZoom: 14, gradient: {0.4: 'blue', 0.6: 'cyan', 0.7: 'lime', 0.8: 'yellow', 1.0: 'red'} });

    // Toggles State
    let showCluster = true;
    let showHeatmap = false;

    // Charts
    let catChartInstance = null;
    let typeChartInstance = null;
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = "'Outfit', sans-serif";

    function isValidProp(val) {
        return val && val !== 'null' && val !== 'undefined';
    }

    function getCategoryInfo(p) {
        if(isValidProp(p.shop)) return { id: 'shop', color: '#22c55e', icon: 'fa-store', name: 'Toko / Shop' };
        if(isValidProp(p.landuse)) return { id: 'landuse', color: '#f97316', icon: 'fa-layer-group', name: 'Penggunaan Lahan' };
        if(isValidProp(p.leisure)) return { id: 'leisure', color: '#3b82f6', icon: 'fa-tree', name: 'Tempat Hiburan' };
        return { id: 'other', color: '#8b5cf6', icon: 'fa-map-marker-alt', name: 'Lainnya' };
    }

    function createPopup(p) {
        const info = getCategoryInfo(p);
        const title = p.name || p.shop || p.landuse || p.leisure || 'Lokasi Tanpa Nama';
        let html = `
            <div class="popup-header">
                <div class="popup-icon" style="background: linear-gradient(135deg, ${info.color}, #0f172a)"><i class="fas ${info.icon}"></i></div>
                <div><div class="popup-title">${title}</div><div class="popup-subtitle" style="color: ${info.color}">${info.name}</div></div>
            </div>
            <div class="popup-body">
        `;
        const attrs = [
            { k: 'Tipe OSM', v: p.osm_type }, { k: 'ID OSM', v: p.osm_id },
            { k: 'Jam Buka', v: p.opening_hours }, { k: 'Kategori Shop', v: p.shop },
            { k: 'Landuse', v: p.landuse }, { k: 'Leisure', v: p.leisure }
        ];
        let hasData = false;
        attrs.forEach(a => {
            if(a.v && a.v !== 'null') { hasData = true; html += `<div class="attr-row"><span class="attr-key">${a.k}</span><span class="attr-val">${a.v}</span></div>`; }
        });
        if(!hasData) html += `<div class="attr-row"><span class="attr-key" style="font-style:italic;">Tidak ada atribut tambahan</span></div>`;
        return html + `</div>`;
    }

    async function init() {
        try {
            // Load boundary
            const resClip = await fetch('clipping_boundary.geojson');
            const dataClip = await resClip.json();
            const clipGeoJSON = dataClip.type === 'FeatureCollection' ? dataClip : dataClip.type === 'Feature' ? { type:'FeatureCollection', features:[dataClip] } : { type:'FeatureCollection', features:[{ type:'Feature', geometry:dataClip, properties:{} }] };
            layerClip = L.geoJSON(clipGeoJSON, { style: { color: '#f97316', weight: 3, opacity: 0.8, fillOpacity: 0.1, dashArray: '8, 6' } }).addTo(map);

            // Load data
            const resPoints = await fetch('daffa_gusti.geojson');
            const dataPoints = await resPoints.json();
            allData = dataPoints.features;
            
            document.getElementById('stat-total').innerText = allData.length.toLocaleString('id-ID');
            
            // Initial render
            applyFilters();
            
            // Hide Loader
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);

            // Bounds
            let bounds = layerClip.getBounds();
            if(bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });
            document.getElementById('btn-home').onclick = () => { if(bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] }); };

        } catch(e) {
            console.error(e);
            document.getElementById('load-text').innerText = 'Gagal memuat data. Error: ' + e.message;
            document.getElementById('load-text').style.color = '#ef4444';
        }
    }

    function applyFilters() {
        const search = document.getElementById('search-input').value.toLowerCase();
        const activeCats = Array.from(document.querySelectorAll('.cat-filter:checked')).map(cb => cb.value);
        
        filteredData = allData.filter(f => {
            const p = f.properties;
            const info = getCategoryInfo(p);
            
            // Check Category
            if(!activeCats.includes(info.id)) return false;
            
            // Check Search
            if(search) {
                const name = (p.name || '').toLowerCase();
                const shop = (p.shop || '').toLowerCase();
                const landuse = (p.landuse || '').toLowerCase();
                const leisure = (p.leisure || '').toLowerCase();
                if(!name.includes(search) && !shop.includes(search) && !landuse.includes(search) && !leisure.includes(search)) return false;
            }
            return true;
        });

        document.getElementById('stat-osm').innerText = filteredData.length.toLocaleString('id-ID');
        renderMap();
        updateCharts();
    }

    function renderMap() {
        // Clear existing
        markersCluster.clearLayers();
        
        // Heatmap data array
        const heatPoints = [];

        const geoJsonLayer = L.geoJSON({ type: 'FeatureCollection', features: filteredData }, {
            pointToLayer: function (feature, latlng) {
                heatPoints.push([latlng.lat, latlng.lng, 1]); // Collect for heatmap
                const info = getCategoryInfo(feature.properties);
                return L.circleMarker(latlng, { radius: 6, fillColor: info.color, color: '#fff', weight: 1.5, opacity: 1, fillOpacity: 0.8 });
            },
            onEachFeature: function (feature, layer) {
                layer.bindPopup(createPopup(feature.properties), { closeButton: true });
                const tip = feature.properties.name || feature.properties.shop || feature.properties.landuse || feature.properties.leisure || 'Lokasi';
                layer.bindTooltip(tip, { direction: 'top', className: 'custom-tooltip' });
            }
        });

        // Add to Cluster
        markersCluster.addLayer(geoJsonLayer);
        
        // Update Heatmap Data
        heatLayer.setLatLngs(heatPoints);

        // Apply toggles
        if(showCluster) { map.addLayer(markersCluster); } else { map.removeLayer(markersCluster); }
        if(showHeatmap) { map.addLayer(heatLayer); } else { map.removeLayer(heatLayer); }
    }

    // Chart Updates
    function updateCharts() {
        let stats = { shop: 0, landuse: 0, leisure: 0, other: 0 };
        let subTypes = {};

        filteredData.forEach(f => {
            const p = f.properties;
            const info = getCategoryInfo(p);
            stats[info.id]++;
            
            // Subtypes
            let type = 'Lainnya';
            if(isValidProp(p.shop)) type = p.shop;
            else if(isValidProp(p.landuse)) type = p.landuse;
            else if(isValidProp(p.leisure)) type = p.leisure;

            if(type !== 'yes' && type !== 'Lainnya') { // ignore generic 'yes'
                subTypes[type] = (subTypes[type] || 0) + 1;
            }
        });

        // Category Chart
        const ctxCat = document.getElementById('categoryChart').getContext('2d');
        if(catChartInstance) catChartInstance.destroy();
        catChartInstance = new Chart(ctxCat, {
            type: 'doughnut',
            data: {
                labels: ['Toko', 'Lahan', 'Rekreasi', 'Lainnya'],
                datasets: [{
                    data: [stats.shop, stats.landuse, stats.leisure, stats.other],
                    backgroundColor: ['#22c55e', '#f97316', '#3b82f6', '#8b5cf6'],
                    borderWidth: 0, hoverOffset: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12 } } }, cutout: '65%' }
        });

        // SubType Chart (Top 5)
        const sortedSubTypes = Object.entries(subTypes).sort((a,b) => b[1] - a[1]).slice(0, 5);
        const ctxType = document.getElementById('topTypeChart').getContext('2d');
        if(typeChartInstance) typeChartInstance.destroy();
        typeChartInstance = new Chart(ctxType, {
            type: 'bar',
            data: {
                labels: sortedSubTypes.map(s => s[0].length > 10 ? s[0].substring(0,10)+'..' : s[0]),
                datasets: [{
                    label: 'Jumlah',
                    data: sortedSubTypes.map(s => s[1]),
                    backgroundColor: '#3b82f6',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { precision: 0 } } }
            }
        });
    }

    // Listeners for Toggles
    document.getElementById('tog-cluster').onclick = function() {
        this.classList.toggle('active'); showCluster = this.classList.contains('active');
        if(showCluster) map.addLayer(markersCluster); else map.removeLayer(markersCluster);
    };
    document.getElementById('tog-heatmap').onclick = function() {
        this.classList.toggle('active'); showHeatmap = this.classList.contains('active');
        if(showHeatmap) { map.addLayer(heatLayer); document.getElementById('tog-cluster').classList.remove('active'); showCluster = false; map.removeLayer(markersCluster); }
        else { map.removeLayer(heatLayer); document.getElementById('tog-cluster').classList.add('active'); showCluster = true; map.addLayer(markersCluster); }
    };
    document.getElementById('tog-clip').onclick = function() {
        this.classList.toggle('active');
        if(this.classList.contains('active')) map.addLayer(layerClip); else map.removeLayer(layerClip);
    };

    // Enter in search input triggers apply
    document.getElementById('search-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') applyFilters();
    });

    // Run
    init();

    // Custom CSS for Tooltip
    const style = document.createElement('style');
    style.innerHTML = `
        .custom-tooltip { background: var(--panel-bg) !important; backdrop-filter: blur(10px) !important; border: 1px solid var(--border-color) !important; color: var(--text-main) !important; border-radius: 8px !important; font-family: 'Outfit', sans-serif !important; font-size: 11px !important; font-weight: 500 !important; box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important; padding: 4px 10px !important; }
        .custom-tooltip::before { border-top-color: var(--panel-bg) !important; }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
